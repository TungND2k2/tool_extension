name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: claw
            artifact_name: claw-linux-x64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin: claw
            artifact_name: claw-linux-arm64
          - name: macos-x64
            os: macos-13
            target: x86_64-apple-darwin
            bin: claw
            artifact_name: claw-darwin-x64
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            bin: claw
            artifact_name: claw-darwin-arm64
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: claw.exe
            artifact_name: claw-windows-x64.exe
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build release binary
        run: cargo build --release -p rusty-claude-cli --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.artifact_name }}"
          chmod +x "dist/${{ matrix.artifact_name }}" || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: rust/dist/${{ matrix.artifact_name }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: rust/dist/${{ matrix.artifact_name }}
          fail_on_unmatched_files: true

  deploy:
    name: Deploy binaries to server
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Deploy to download server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Copy all binaries
          for dir in dist/*/; do
            artifact=$(basename "$dir")
            file="$dir$artifact"
            if [[ -f "$file" ]]; then
              scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
                "$file" \
                "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/${artifact}"
              echo "Deployed: $artifact"
            fi
          done
          rm -f /tmp/deploy_key
